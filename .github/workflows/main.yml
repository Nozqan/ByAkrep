name: Akrep Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # En güncel checkout

      - name: Build with Buildozer
        # Hata veren eski action yerine en sağlamını kullanıyoruz
        uses: Kou-S/buildozer-action@v2 
        with:
          command: android debug
          buildozer_version: master

      - name: Upload APK
        uses: actions/upload-artifact@v4 # Hata veren v3 yerine v4 yaptık
        with:
          name: ByAkrep-VIP-APK
          path: bin/*.apk
          

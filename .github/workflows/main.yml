name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04 # Dün çalışan stabil sürüm
    steps:
      - uses: actions/checkout@v3
      
      - name: Gerekli Paketleri Kur
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          python3 -m pip install --upgrade pip
          python3 -m pip install buildozer cython==0.29.33 kivy

      - name: APK Derle (ByAkrep)
        run: |
          yes | buildozer android debug

      - name: APK Dosyasını Yayınla
        uses: actions/upload-artifact@v3
        with:
          name: ByAkrep-VIP-APK
          path: bin/*.apk
          

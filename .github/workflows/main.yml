name: Akrep Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build APK
        uses: ArtemGr/buildozer-action@v1
        with:
          command: android debug
          buildozer_version: master
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: ByAkrep-VIP-APK
          path: bin/*.apk
          
